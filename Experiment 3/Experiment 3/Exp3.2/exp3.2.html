<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Management System</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(180deg, #f4f8fc, #eef3f8);
    }

    .app {
      max-width: 700px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 34px;
    }

    .search {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d0d7e2;
      margin-bottom: 16px;
    }

    .add-section {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .add-section input {
      flex: 1;
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid #d0d7e2;
    }

    .add-section button {
      padding: 12px 18px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
      background: #0d6efd;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .book {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px;
      border: 1px solid #e1e7ef;
      border-radius: 14px;
      margin-bottom: 14px;
      background: #fafcff;
    }

    .book-title {
      font-size: 18px;
      font-weight: 600;
    }

    .book-author {
      color: #555;
      margin-top: 4px;
    }

    .remove {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>Library Management<br>System</h1>

    <input type="text" id="search" class="search" placeholder="Search books..." onkeyup="searchBooks()">

    <div class="add-section">
      <input type="text" id="title" placeholder="Book Title">
      <input type="text" id="author" placeholder="Author">
      <button onclick="addBook()">Add Book</button>
    </div>

    <div id="bookList"></div>
  </div>

<script>
  let books = [
    { title: "The Great Gatsby", author: "F. Scott Fitzgerald" },
    { title: "To Kill a Mockingbird", author: "Harper Lee" },
    { title: "The Great Gatsby", author: "S. Scott Fitzgerald" }
  ];

  function displayBooks(list) {
    const container = document.getElementById("bookList");
    container.innerHTML = "";

    list.forEach((book, index) => {
      const div = document.createElement("div");
      div.className = "book";

      div.innerHTML = `
        <div>
          <div class="book-title">${book.title}</div>
          <div class="book-author">by ${book.author}</div>
        </div>
        <button class="remove" onclick="removeBook(${index})">Remove</button>
      `;

      container.appendChild(div);
    });
  }

  function addBook() {
    const title = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();

    if (!title || !author) {
      alert("Please enter both title and author");
      return;
    }

    books.push({ title, author });
    document.getElementById("title").value = "";
    document.getElementById("author").value = "";
    displayBooks(books);
  }

  function removeBook(index) {
    books.splice(index, 1);
    displayBooks(books);
  }

  function searchBooks() {
    const query = document.getElementById("search").value.toLowerCase();
    const filtered = books.filter(book =>
      book.title.toLowerCase().includes(query) ||
      book.author.toLowerCase().includes(query)
    );
    displayBooks(filtered);
  }

  displayBooks(books);
</script>

</body>
</html>
