<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Cards</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      padding: 40px;
      background: linear-gradient(180deg, #f5f8fb, #eef3f8);
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.12);
    }

    .image-box {
      background: #f1f5f9;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .image-box img {
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      margin: 8px 0;
    }

    .price {
      font-size: 22px;
      font-weight: 700;
      margin: 6px 0 14px;
    }

    .status {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
    }

    .in-stock {
      background: #e7f9ef;
      color: #1f7a4d;
    }

    .out-stock {
      background: #fdeaea;
      color: #b3261e;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Card 1 -->
    <div class="card">
      <div class="image-box">
        <img src="https://sony.scene7.com/is/image/sonyglobalsolutions/WH1000XM6_Product_intro_12_M?$productIntroPlatemobile$&fmt=png-alpha" alt="Wireless Headphones">
      </div>
      <div class="title">Wireless Headphones</div>
      <div class="price">$129.99</div>
      <span class="status in-stock">In Stock</span>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <div class="image-box">
        <img src="https://images.unsplash.com/photo-1587829741301-dc798b83add3" alt="Mechanical Keyboard">
      </div>
      <div class="title">Mechanical Keyboard</div>
      <div class="price">$89.99</div>
      <span class="status out-stock">Out of Stock</span>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <div class="image-box">
        <img src="https://image.cdn.shpy.in/278008/1691235493459_SKU-0899_2.jpg?width=600&format=webp" alt="Smart Watch">
      </div>
      <div class="title">Smart Watch</div>
      <div class="price">$199.99</div>
      <span class="status in-stock">In Stock</span>
    </div>

  </div>

</body>
</html>
